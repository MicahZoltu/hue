<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Hue Mobile</title>

	<link rel="manifest" href="./manifest.webmanifest">
	<meta name="theme-color" content="#f0a847">

	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-title" content="Hue">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<link rel="apple-touch-icon" href="./icon.svg">

	<link rel="stylesheet" href="mobile.css">
</head>
<body>
	<div id="app"></div>
	<div id="toast"></div>
	<script src="color.js"></script>
	<script src="hue.js"></script>
	<script src="core.js"></script>
	<script src="mobile.js"></script>
	<script>
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', function () {
				navigator.serviceWorker.register('./pwa-service-worker.js').catch(function (err) {
					console.warn('Service worker registration failed:', err);
				});
			});
		}
	</script>
</body>
</html>
