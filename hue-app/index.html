<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Hue Controller</title>
	<style>
		body {
			display: flex;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
			background: #0f1115;
			color: #e6e8eb;
			font: 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
		}
		.spinner {
			width: 24px;
			height: 24px;
			border: 3px solid #2a3038;
			border-top-color: #f0a847;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
			margin-right: 12px;
		}
		@keyframes spin {
			to { transform: rotate(360deg); }
		}
		.loading {
			display: flex;
			align-items: center;
		}
	</style>
</head>
<body>
	<div class="loading">
		<div class="spinner"></div>
		<div>Loading…</div>
	</div>
	<script>
		var redirected = false;
		function go() {
			if (redirected) return;
			redirected = true;
			location.replace('./hue.html');
		}
		setTimeout(go, 10000);
		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.register('./bundle-service-worker.js').then(function () {
				return navigator.serviceWorker.ready;
			}).then(go).catch(go);
		} else {
			go();
		}
	</script>
</body>
</html>
